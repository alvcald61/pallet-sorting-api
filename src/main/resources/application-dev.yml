spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tupack?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC-5
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

application:
  security:
    jwt:
      secret: ${JWT_SECRET:dev-secret-key-for-local-development-only-32chars}
      access-token-expiration-minutes: 60
      refresh-token-expiration-days: 7
    permit-all: true
    cors:
      allowed-origins: http://localhost:3000,http://localhost:5173

logging:
  level:
    root: INFO
    com.tupack.palletsortingapi: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
#  pattern:
#    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/pallet-sorting-api-dev.log
#    max-size: 10MB
#    max-history: 30

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
