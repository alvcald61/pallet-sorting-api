spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false

application:
  security:
    jwt:
      secret: test-secret-key-for-unit-tests-only-32-characters-long
      access-token-expiration-minutes: 5
      refresh-token-expiration-days: 1
    permit-all: true

logging:
  level:
    com.tupack.palletsortingapi: WARN
