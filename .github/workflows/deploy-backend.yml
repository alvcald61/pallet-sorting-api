name: Deploy Backend (Railway)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # 1. Tests
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Install local 2D-Bin-Packing lib
        run: |
          mvn install:install-file \
            -Dfile=lib/2d-bin-packing-1.0.0.jar \
            -DgroupId=org.packing \
            -DartifactId=2d-bin-packing \
            -Dversion=1.0.0 \
            -Dpackaging=jar \
            --batch-mode

      - name: Run tests
        run: mvn test --batch-mode

  # ─────────────────────────────────────────────
  # 2. Build JAR + Deploy to Railway
  # ─────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build production JAR
        run: mvn package -DskipTests --batch-mode

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_BACKEND }} --detach
